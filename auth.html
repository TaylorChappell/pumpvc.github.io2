<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Sign in — Solana Dev Tools</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="shared.css">
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <div class="auth-wrap">
    <div class="card auth-card">
      <div class="brand" style="margin-bottom:18px;">
        <div class="brand-mark">UDT</div>
        <div>
          <div class="brand-title">Sign in</div>
          <div class="brand-sub">Access token in session storage, refresh token in httpOnly cookie.</div>
        </div>
      </div>
      <div id="auth-message" class="muted" style="margin-bottom:16px;"></div>
      <div class="grid grid-2">
        <form id="login-form" class="card panel">
          <h1>Login</h1>
          <label class="label">Email</label>
          <input class="input" name="email" type="email" required>
          <label class="label" style="margin-top:12px;">Password</label>
          <input class="input" name="password" type="password" required>
          <button class="btn primary" style="margin-top:16px; width:100%;">Login</button>
        </form>
        <form id="register-form" class="card panel">
          <h1>Create account</h1>
          <label class="label">Name</label>
          <input class="input" name="name" required>
          <label class="label" style="margin-top:12px;">Email</label>
          <input class="input" name="email" type="email" required>
          <label class="label" style="margin-top:12px;">Password</label>
          <input class="input" name="password" type="password" minlength="10" required>
          <button class="btn primary" style="margin-top:16px; width:100%;">Register</button>
        </form>
      </div>
    </div>
  </div>
  <script src="api.js"></script>
  <script src="auth.js"></script>
  <script>AuthPage.boot();</script>
</body>
</html>
