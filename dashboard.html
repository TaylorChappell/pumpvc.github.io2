<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Dashboard — Solana Dev Tools</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="shared.css">
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <div class="app-shell">
    <aside class="sidebar">
      <div class="brand">
        <div class="brand-mark">UDT</div>
        <div>
          <div class="brand-title">Secure dashboard</div>
          <div class="brand-sub">GitHub Pages frontend</div>
        </div>
      </div>
      <nav class="nav">
        <button data-route="overview" class="active">Overview</button>
        <button data-route="wallets">Wallets</button>
        <button data-route="tracker">Tracker</button>
        <button data-route="bundle">Bundle</button>
        <button data-route="split">Split</button>
        <button data-route="sniper">Sniper</button>
        <button data-route="volume">Volume</button>
        <button data-route="jobs">Jobs</button>
        <button data-route="settings">Settings</button>
      </nav>
    </aside>
    <main class="content">
      <div class="topbar">
        <div>
          <h1 class="title" id="view-title">Overview</h1>
          <p class="subtitle" id="view-subtitle">Thin client dashboard with protected backend flows.</p>
        </div>
        <div class="row" style="justify-content:flex-end; gap:10px;">
          <a class="btn ghost" href="admin.html">Admin</a>
          <button class="btn danger" id="logout-btn">Logout</button>
        </div>
      </div>
      <div id="app-main"></div>
    </main>
  </div>
  <script src="api.js"></script>
  <script src="wallets.js"></script>
  <script src="wallet-tracker.js"></script>
  <script src="bundle.js"></script>
  <script src="split.js"></script>
  <script src="sniper.js"></script>
  <script src="volume-bot.js"></script>
  <script src="popup.js"></script>
  <script>UDT_APP.bootDashboard();</script>
</body>
</html>
