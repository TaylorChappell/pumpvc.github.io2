<html lang="en">
<head>

  <style>
    /* ── Web overrides: remove popup size constraint ────────────────────── */
    html { width: 100% !important; height: 100vh !important; }
    body { width: 100% !important; height: 100vh !important; }
    #root { height: calc(100vh - 40px) !important; }
    .shell { height: calc(100vh - 40px) !important; }
    /* Wider sidebar is comfortable on desktop */
    .sidebar { width: 170px !important; min-width: 170px !important; }

    /* ── Web topbar ─────────────────────────────────────────────────────── */
    #web-bar {
      height: 40px;
      background: var(--bg2);
      border-bottom: 1px solid var(--border-md);
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 12px;
      position: relative;
      z-index: 10;
    }
    #web-bar::after {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(180deg, rgba(255,255,255,0.12) 0%, transparent 100%);
      pointer-events: none;
    }
    .wb-left  { display: flex; align-items: center; gap: 8px; position: relative; z-index: 1; }
    .wb-right { display: flex; align-items: center; gap: 7px; position: relative; z-index: 1; }

    .wb-logo  { display: flex; align-items: center; gap: 7px; text-decoration: none; }
    .wb-logo img { width: 20px; height: 20px; border-radius: 5px; display: block; }
    .wb-name  { font-size: 11px; font-weight: 700; color: var(--navy); font-family: var(--sans); letter-spacing: -0.01em; }

    .wb-sep   { width: 1px; height: 14px; background: var(--border-md); }

    .wb-sub   {
      display: flex; align-items: center; gap: 4px;
      padding: 2px 8px; border-radius: 20px;
      font-size: 9.5px; font-weight: 600;
      border: 1px solid;
    }
    .wb-sub.active   { background: var(--green-bg); color: var(--green-dim); border-color: rgba(34,197,94,0.25); }
    .wb-sub.inactive { background: var(--danger-bg); color: var(--danger); border-color: rgba(220,38,38,0.2); }
    .wb-sub.loading  { background: var(--navy-ghost); color: var(--text-muted); border-color: var(--border-md); }

    .wb-btn {
      padding: 4px 10px;
      border-radius: 5px;
      font-family: var(--sans);
      font-size: 10px;
      font-weight: 600;
      cursor: pointer;
      border: 1px solid var(--border-md);
      background: var(--surface);
      color: var(--text-dim);
      transition: all 0.12s;
    }
    .wb-btn:hover { background: var(--navy); color: #fff; border-color: var(--navy); }
    .wb-btn.primary { background: var(--navy); color: #fff; border-color: var(--navy); }
    .wb-btn.primary:hover { background: var(--navy-mid); }

    /* ── Payment overlay ────────────────────────────────────────────────── */
    #pay-overlay {
      display: none;
      position: fixed; inset: 0;
      background: rgba(13,31,74,0.45);
      backdrop-filter: blur(5px);
      z-index: 500;
      align-items: center;
      justify-content: center;
    }
    .pay-box {
      background: var(--surface);
      border: 1px solid var(--border-md);
      border-radius: 10px;
      padding: 20px;
      width: 340px;
      box-shadow: 0 20px 50px rgba(13,31,74,0.22);
    }
    .pay-box-title { font-size: 13px; font-weight: 700; color: var(--navy); margin-bottom: 3px; }
    .pay-box-sub   { font-size: 10px; color: var(--text-muted); margin-bottom: 14px; }
    .pay-grid {
      display: grid; grid-template-columns: repeat(3,1fr); gap: 6px; margin-bottom: 14px;
    }
    .pay-opt {
      padding: 10px 6px;
      background: var(--surface2);
      border: 1px solid var(--border-md);
      border-radius: 7px;
      cursor: pointer;
      text-align: center;
      transition: all 0.12s;
    }
    .pay-opt:hover, .pay-opt.sel { border-color: var(--navy); background: var(--navy-ghost); }
    .pay-opt svg { width: 18px; height: 18px; color: var(--navy); display: block; margin: 0 auto 4px; }
    .pay-opt-n { font-size: 9.5px; font-weight: 600; color: var(--text); }
    .pay-inst { margin-top: 6px; }
    .pay-addr {
      background: var(--surface2); border: 1px solid var(--border-md);
      border-radius: 5px; padding: 7px 9px;
      font-family: var(--mono); font-size: 9.5px; word-break: break-all;
      cursor: pointer; margin: 6px 0; color: var(--navy);
    }
    .pay-addr:hover { border-color: var(--navy); }
    .pay-amt  { font-size: 17px; font-weight: 700; color: var(--navy); font-family: var(--mono); }
    .pay-watch { display: flex; align-items: center; gap: 5px; font-size: 9px; color: var(--text-muted); margin-top: 8px; }
    .pay-spin {
      width: 9px; height: 9px;
      border: 1.5px solid var(--border-md); border-top-color: var(--navy);
      border-radius: 50%; animation: web-spin 0.6s linear infinite; flex-shrink: 0;
    }
    @keyframes web-spin { to { transform: rotate(360deg); } }
    .pay-foot { display: flex; gap: 7px; margin-top: 12px; }
    .pay-foot .btn { flex: 1; }
  </style>
</head>
<body>

<!--
  ═══════════════════════════════════════════
  CHROME SHIM — must run before all other JS
  Maps chrome.storage.local → localStorage
  so extension code runs unchanged in browser
  ═══════════════════════════════════════════
-->
<script>
(function() {
  'use strict';

  /* localStorage-backed storage that mirrors chrome.storage.local API */
  const STORE_KEY = 'udt_web_store';
  const mem = {};

  // Warm from localStorage
  try {
    const r = localStorage.getItem(STORE_KEY);
    if (r) Object.assign(mem, JSON.parse(r));
  } catch {}

  const flush = () => {
    try { localStorage.setItem(STORE_KEY, JSON.stringify(mem)); } catch {}
  };

  window.chrome = window.chrome || {};

  chrome.storage = {
    local: {
      get(keys, cb) {
        const out = {};
        if (typeof keys === 'string') {
          out[keys] = mem[keys];
        } else if (Array.isArray(keys)) {
          keys.forEach(k => { out[k] = mem[k]; });
        } else {
          Object.assign(out, mem);
        }
        if (cb) cb(out);
        return Promise.resolve(out);
      },
      set(obj, cb) {
        Object.assign(mem, obj);
        flush();
        if (cb) cb();
        return Promise.resolve();
      },
      remove(keys, cb) {
        (Array.isArray(keys) ? keys : [keys]).forEach(k => delete mem[k]);
        flush();
        if (cb) cb();
        return Promise.resolve();
      },
      clear(cb) {
        Object.keys(mem).forEach(k => delete mem[k]);
        flush();
        if (cb) cb();
        return Promise.resolve();
      }
    }
  };

  /* Alarms — no-ops on web (background SW doesn't run) */
  chrome.alarms = {
    create() {},
    clear() {},
    clearAll() {},
    get(name, cb) { if (cb) cb(null); return Promise.resolve(null); },
    getAll(cb)    { if (cb) cb([]); return Promise.resolve([]); },
    onAlarm: { addListener() {} }
  };

  /* Runtime — stub sendMessage */
  chrome.runtime = chrome.runtime || {};
  chrome.runtime.lastError = null;
  chrome.runtime.sendMessage = (msg, cb) => { if (cb) cb({ ok: false }); return Promise.resolve(); };
  chrome.runtime.onMessage   = { addListener() {} };

  /* Notifications — use Web Notifications API */
  chrome.notifications = {
    create(id, opts) {
      if (typeof Notification !== 'undefined' && Notification.permission === 'granted')
        new Notification(opts.title, { body: opts.message });
    }
  };

  /* Identity — Google sign-in on web is handled by GIS SDK (wired below) */
  chrome.identity = {
    getAuthToken(opts, cb) { if (cb) cb(null); },
    removeCachedAuthToken(opts, cb) { if (cb) cb(); }
  };
})();
</script>

<!-- ── Extension JS — same order as popup.html ───────────────────────────
  NOTE: popup.html uses "split.js" (lowercase), so we saved Split.js as split.js
──────────────────────────────────────────────────────────────────────────── -->

<!-- Google Identity Services SDK for web Google sign-in -->
<script src="https://accounts.google.com/gsi/client" async defer></script>

<!-- ── Web wiring ─────────────────────────────────────────────────────────
  Everything here runs after popup.js has defined S, render, saveState etc.
──────────────────────────────────────────────────────────────────────────── -->
<script>
document.addEventListener('DOMContentLoaded', () => {

  // ── 1. Intercept auth-google to use GIS on web ───────────────────────
  //    auth.js's handleAuthAction calls authGoogleSignIn() which uses
  //    chrome.identity (extension-only). On web, we swap to GIS + backend.
  const _origAuthHandler = window.handleAuthAction;
  window.handleAuthAction = async function(action, el) {
    if (action !== 'auth-google') {
      return _origAuthHandler ? _origAuthHandler(action, el) : undefined;
    }

    S.authScreen = { ...S.authScreen, loading: true, error: '' };
    render();

    try {
      if (typeof google === 'undefined' || !google.accounts) {
        throw new Error('Google Sign-In not loaded. Please refresh.');
      }

      await new Promise((resolve, reject) => {
        google.accounts.id.initialize({
          client_id: '218003563778-dljv6ld9c467r57p38a6m32gibrtfmld.apps.googleusercontent.com',
          callback: async (response) => {
            try {
              // apiReq is defined in auth.js — calls /auth/google with id_token
              const data = await apiReq('POST', '/auth/google', { id_token: response.credential });
              // Build the same S.auth shape auth.js sets
              const cryptoKey = await deriveEncKey(data.googleSub || data.email, String(data.userId || data.user?.id || '0'));
              const encKeyB64 = await exportKeyB64(cryptoKey);
              await saveAuthLocally(data.token, data.email || data.user?.email, data.userId || data.user?.id, encKeyB64);
              S.auth = {
                loggedIn: true,
                token: data.token,
                email: data.email || data.user?.email,
                userId: data.userId || data.user?.id,
                cryptoKey,
                isGoogle: true
              };
              try { await syncWalletsFromServer(); } catch {}
              resolve();
            } catch (e) { reject(e); }
          }
        });
        google.accounts.id.prompt(notification => {
          if (notification.isNotDisplayed() || notification.isSkippedMoment()) {
            reject(new Error('Google sign-in was dismissed. Try again or use email/password.'));
          }
        });
      });

      S.authScreen = { mode: 'login', error: '', loading: false };
      await saveState();
      render();
      updateWbSub();

    } catch (e) {
      S.authScreen = { ...S.authScreen, loading: false, error: e.message };
      render();
    }
  };

  // ── 2. Override showSubGate so tools don't replace the whole page ────
  //    Instead show the pay overlay, keeping the sidebar intact.
  window.showSubGate = function(sub) {
    openPayOverlay();
  };

  // ── 3. Kick topbar sub check after auth settles ───────────────────
  setTimeout(updateWbSub, 1800);
  setInterval(updateWbSub, 3 * 60 * 1000);

}); // end DOMContentLoaded

// ── Topbar subscription status ─────────────────────────────────────────
async function updateWbSub() {
  const chip = document.getElementById('wb-sub');
  const dot  = document.getElementById('wb-dot');
  const txt  = document.getElementById('wb-sub-txt');
  const btn  = document.getElementById('wb-sub-btn');
  if (!chip) return;

  try {
    // Use SubAPI from api.js (loaded alongside the extension JS)
    const sub = await SubAPI.getStatus();

    if (sub.active) {
      chip.className = 'wb-sub active';
      dot.className  = 'status-dot online';
      const days = sub.expires_at
        ? Math.max(0, Math.ceil((new Date(sub.expires_at) - Date.now()) / 86400000))
        : null;
      txt.textContent = days !== null ? `${days}d left` : (sub.trial ? 'Trial' : 'Active');
      if (btn) btn.style.display = 'none';
    } else {
      chip.className = 'wb-sub inactive';
      dot.className  = 'status-dot offline';
      txt.textContent = 'No subscription';
      if (btn) btn.style.display = '';
    }
  } catch {
    chip.className = 'wb-sub loading';
    if (dot) dot.className = 'status-dot';
    if (txt) txt.textContent = 'Offline';
  }
}

// ── Sign out ───────────────────────────────────────────────────────────
async function webSignOut() {
  try {
    if (typeof authLogout === 'function') await authLogout();
    else if (typeof Auth !== 'undefined') await Auth.clearSession();
  } catch {}
  window.location.href = 'auth.html';
}

// ── Payment overlay ────────────────────────────────────────────────────
let _payMethod = null;
let _payPoll   = null;

function openPayOverlay() {
  _payMethod = null;
  document.querySelectorAll('.pay-opt').forEach(o => o.classList.remove('sel'));
  document.getElementById('pay-inst').innerHTML = '';
  const btn = document.getElementById('pay-gen-btn');
  if (btn) { btn.disabled = false; btn.textContent = 'Generate Details'; }
  document.getElementById('pay-overlay').style.display = 'flex';
}

function paySelect(method, el) {
  _payMethod = method;
  document.querySelectorAll('.pay-opt').forEach(o => o.classList.remove('sel'));
  el.classList.add('sel');
  document.getElementById('pay-inst').innerHTML = '';
}

async function payGenerate() {
  if (!_payMethod) {
    if (typeof showToast === 'function') showToast('Select a payment method first');
    return;
  }
  const btn = document.getElementById('pay-gen-btn');
  btn.disabled = true; btn.textContent = 'Loading…';

  try {
    const d = await SubAPI.getPaymentAddress(_payMethod);
    const inst = document.getElementById('pay-inst');

    if (_payMethod === 'paypal') {
      inst.innerHTML = `
        <a href="${d.paypal_url}" target="_blank"
           class="btn btn-primary btn-full"
           style="display:block;text-align:center;text-decoration:none;margin-top:8px;">
          Open PayPal →
        </a>`;
    } else {
      const addrId = 'pay-addr-' + Date.now();
      inst.innerHTML = `
        <div style="font-size:9.5px;color:var(--text-muted);margin-bottom:3px;">Send exactly:</div>
        <div class="pay-amt">${d.amount_sol} SOL</div>
        <div style="font-size:9.5px;color:var(--text-muted);margin:6px 0 2px;">To address (click to copy):</div>
        <div class="pay-addr" id="${addrId}">${d.address}</div>
        <div class="pay-watch"><div class="pay-spin"></div>Watching chain for confirmation…</div>`;

      document.getElementById(addrId)?.addEventListener('click', () => {
        navigator.clipboard.writeText(d.address);
        if (typeof showToast === 'function') showToast('Address copied!');
      });

      if (_payPoll) clearInterval(_payPoll);
      _payPoll = setInterval(async () => {
        try {
          const r = await SubAPI.checkPayment(d.payment_id);
          if (r.confirmed) {
            clearInterval(_payPoll);
            document.getElementById('pay-overlay').style.display = 'none';
            if (typeof showToast === 'function') showToast('Payment confirmed! 🎉');
            updateWbSub();
          }
        } catch {}
      }, 5000);
    }

    btn.textContent = '✓ Generated';

  } catch (e) {
    if (typeof showToast === 'function') showToast(e.message || 'Failed to get payment details');
    btn.disabled = false; btn.textContent = 'Generate Details';
  }
}
</script>
