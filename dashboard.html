<!--
  ════════════════════════════════════════════════
  STEP 1 — CHROME SHIM
  Runs before ALL other JS.
  Bridges chrome.storage.local → localStorage.
  Also pre-loads the website's auth token so
  auth.js can find it via its own storage key.
  ════════════════════════════════════════════════
-->
<script>
(function() {
  'use strict';

  /* ── localStorage-backed storage ── */
  const MEM = {};
  const STORE_KEY = 'udt_web_store';

  // Warm from localStorage
  try {
    const r = localStorage.getItem(STORE_KEY);
    if (r) Object.assign(MEM, JSON.parse(r));
  } catch {}

  const flush = () => {
    try { localStorage.setItem(STORE_KEY, JSON.stringify(MEM)); } catch {}
  };

  window.chrome = window.chrome || {};
  chrome.storage = {
    local: {
      get(keys, cb) {
        const out = {};
        if (typeof keys === 'string')    out[keys] = MEM[keys];
        else if (Array.isArray(keys))    keys.forEach(k => out[k] = MEM[k]);
        else                             Object.assign(out, MEM);
        if (cb) cb(out);
        return Promise.resolve(out);
      },
      set(obj, cb)    { Object.assign(MEM, obj); flush(); if (cb) cb(); return Promise.resolve(); },
      remove(k, cb)   { (Array.isArray(k)?k:[k]).forEach(k=>delete MEM[k]); flush(); if (cb) cb(); return Promise.resolve(); },
      clear(cb)       { Object.keys(MEM).forEach(k=>delete MEM[k]); flush(); if (cb) cb(); return Promise.resolve(); }
    }
  };
  chrome.alarms = {
    create(){}, clear(){}, clearAll(){},
    get(n,cb){ if(cb) cb(null); return Promise.resolve(null); },
    getAll(cb){ if(cb) cb([]); return Promise.resolve([]); },
    onAlarm: { addListener(){} }
  };
  chrome.runtime = chrome.runtime || {};
  chrome.runtime.lastError = null;
  chrome.runtime.sendMessage = (msg, cb) => { if (cb) cb({ ok:false }); return Promise.resolve(); };
  chrome.runtime.onMessage   = { addListener(){} };
  chrome.notifications = {
    create(id, opts) {
      if (typeof Notification !== 'undefined' && Notification.permission === 'granted')
        new Notification(opts.title, { body: opts.message });
    }
  };
  chrome.identity = {
    getAuthToken(opts, cb)            { if (cb) cb(null); },
    removeCachedAuthToken(opts, cb)   { if (cb) cb(); }
  };

  /*
   * ── AUTH BRIDGE ──────────────────────────────────────────────────────────
   * The website's auth.html stores the JWT in localStorage as 'udt_token'
   * (set by api.js: Auth.TOKEN_KEY = 'udt_token').
   * auth.js (extension) stores it in chrome.storage.local as 'udt_auth_v2'.
   * We read the website token now and pre-populate MEM so auth.js's
   * tryAutoLogin() will find it and skip the login screen entirely.
   *
   * For the encryption key: website logins don't go through the extension's
   * PBKDF2 flow, so we set cryptoKey to null. Wallet sync still works because
   * syncWalletsFromServer() only needs the JWT, not the crypto key
   * (the key is only needed to decrypt blobs that exist from extension use).
   */
  try {
    const webToken = localStorage.getItem('udt_token');
    const webUser  = localStorage.getItem('udt_user');

    if (webToken && !MEM['udt_auth_v2']) {
      let email  = '';
      let userId = 0;
      try {
        const u  = JSON.parse(webUser || '{}');
        email    = u.email  || '';
        userId   = u.id     || 0;
      } catch {}

      // Stuff a fake encKeyB64 so tryAutoLogin() doesn't bail out early.
      // We generate a random one-time key just to satisfy the non-null check.
      // syncWalletsFromServer() checks S.auth.cryptoKey before decrypting —
      // if it's null the sync silently skips, which is fine for web-only users
      // (their wallets live only in the extension).
      MEM['udt_auth_v2'] = JSON.stringify({
        token:     webToken,
        email:     email,
        userId:    userId,
        encKeyB64: null,   // no password-derived key on web
        ts:        Date.now()
      });
      flush();
    }
  } catch {}
})();
</script>

<script src="api.js"></script>

<script>
/*
 * ════════════════════════════════════════════════════════════════════════
 * WEB WIRING
 * Runs after popup.js, auth.js, api.js etc. are all defined.
 * ════════════════════════════════════════════════════════════════════════
 */

// ── State for web-only tools ──────────────────────────────────────────────
let _webTool   = null;   // 'subscription' | 'admin-panel' | null (null = use popup.js routing)
let _subData   = null;
let _adminTab  = 'users'; // 'users' | 'codes' | 'whitelist' | 'admins'
let _payMethod = null;
let _payPoll   = null;

document.addEventListener('DOMContentLoaded', async () => {

  // ── 1. Auth bridge: patch tryAutoLogin to skip encKeyB64 null check ──────
  //    auth.js's tryAutoLogin() bails if !stored.encKeyB64.
  //    We stored null in the bridge above, so we patch loadAuthLocally to
  //    inject a dummy non-null value so the check passes, then set S.auth
  //    directly without needing the real crypto key.
  const _origTryAutoLogin = window.tryAutoLogin;
  window.tryAutoLogin = async function() {
    // Try the normal extension path first (works if user logged in via extension before)
    const result = await _origTryAutoLogin();
    if (result) return result;

    // Fallback: use the website JWT from localStorage directly
    const webToken = localStorage.getItem('udt_token');
    if (!webToken) {
      // Not logged in anywhere — redirect to auth page
      window.location.href = 'auth.html';
      return false;
    }

    try {
      // Verify the token is still valid
      const url  = 'https://ultimatedevtools-production.up.railway.app';
      const res  = await fetch(url + '/api/auth/me', {
        headers: { 'Authorization': 'Bearer ' + webToken }
      });
      if (!res.ok) throw new Error('Token invalid');

      const user = await res.json();

      // Set S.auth directly — no crypto key needed for web-only users
      S.auth = {
        loggedIn: true,
        token:    webToken,
        email:    user.email  || '',
        userId:   user.id     || user.userId || 0,
        is_admin: user.is_admin || false,
        cryptoKey: null  // no extension-derived key for web sessions
      };

      // Persist so subsequent renders don't re-fetch
      await saveState();
      return true;
    } catch {
      // Token is invalid or expired — send back to login
      localStorage.removeItem('udt_token');
      localStorage.removeItem('udt_user');
      window.location.href = 'auth.html';
      return false;
    }
  };

  // ── 2. Wrap render() to intercept web-only tools ─────────────────────────
  const _origRender = window.render;
  window.render = function() {
    // If not logged in — redirect rather than show extension's login screen
    if (!S.auth?.loggedIn) {
      window.location.href = 'auth.html';
      return;
    }

    // If a web-only tool is active, render it ourselves
    if (_webTool === 'subscription') {
      renderSubscriptionPage();
      // Keep sidebar nav state correct
      syncWebNav();
      return;
    }
    if (_webTool === 'admin-panel') {
      renderAdminPage();
      syncWebNav();
      return;
    }

    // Otherwise let popup.js render normally
    _origRender();
    syncWebNav();
  };

  // ── 3. Kick init ───────────────────────────────────────────────────────
  setTimeout(async () => {
    // Show/hide admin nav item
    const user = S.auth;
    if (user?.is_admin) {
      document.getElementById('nav-admin').style.display = '';
    }

    // Update topbar sub status
    await refreshSubStatus();
    setInterval(refreshSubStatus, 3 * 60 * 1000);
  }, 1000);

}); // end DOMContentLoaded

// ── Nav helpers ─────────────────────────────────────────────────────────────
function setWebTool(tool) {
  _webTool = tool;
  syncWebNav();
  if (tool === 'subscription') renderSubscriptionPage();
  if (tool === 'admin-panel')  renderAdminPage();
}

function clearWebTool() {
  _webTool = null;
}

// Called from popup.js's nav item click (popup.js sets S.activeTool directly)
// We wrap S.activeTool setter via a Proxy-like approach by watching clicks
document.addEventListener('click', (e) => {
  const item = e.target.closest('.nav-item[data-tool]');
  if (!item) return;
  const tool = item.dataset.tool;
  // If clicking a standard tool, clear the web-tool override
  if (tool && tool !== 'subscription' && tool !== 'admin-panel') {
    clearWebTool();
  }
});

function syncWebNav() {
  // Sync .active class across all nav items
  document.querySelectorAll('#nav-list .nav-item, #account-nav-list .nav-item, #settings-nav-btn').forEach(el => {
    const tool = el.dataset.tool || (el.id === 'settings-nav-btn' ? 'settings' : null);
    if (!tool) return;
    if (_webTool) {
      el.classList.toggle('active', tool === _webTool);
    } else {
      el.classList.toggle('active',
        el.id === 'settings-nav-btn'
          ? S.activeTool === 'settings'
          : tool === S.activeTool
      );
    }
  });
}

// ── Sub status ───────────────────────────────────────────────────────────────
async function refreshSubStatus() {
  const chip = document.getElementById('wb-sub');
  const dot  = document.getElementById('wb-dot');
  const txt  = document.getElementById('wb-sub-txt');
  const btn  = document.getElementById('wb-sub-btn');
  if (!chip) return;

  try {
    const token = localStorage.getItem('udt_token') || S.auth?.token;
    if (!token) return;

    const res = await fetch('https://ultimatedevtools-production.up.railway.app/api/subscription/status', {
      headers: { 'Authorization': 'Bearer ' + token }
    });
    if (!res.ok) throw new Error();
    _subData = await res.json();

    if (_subData.active) {
      chip.className = 'wb-sub active';
      dot.className  = 'status-dot online';
      const days = _subData.expires_at
        ? Math.max(0, Math.ceil((new Date(_subData.expires_at) - Date.now()) / 86400000))
        : null;
      txt.textContent = days !== null ? `${days}d left` : (_subData.trial ? 'Trial' : 'Active');
      if (btn) btn.style.display = 'none';

      // Show expiry warning badge in sidebar if < 3 days
      const exBadge = document.getElementById('sub-expiry-badge');
      if (exBadge && days !== null && days <= 3) {
        exBadge.textContent = `${days}d`;
        exBadge.style.display = '';
      }
    } else {
      chip.className = 'wb-sub inactive';
      dot.className  = 'status-dot offline';
      txt.textContent = 'No subscription';
      if (btn) btn.style.display = '';
    }
  } catch {
    chip.className = 'wb-sub loading';
    if (dot) dot.className = 'status-dot';
    if (txt) txt.textContent = 'Offline';
  }
}

async function redeemPromoCode() {
  const code = document.getElementById('promo-input')?.value?.trim().toUpperCase();
  const res  = document.getElementById('promo-result');
  if (!code) { if (res) res.innerHTML = '<span style="color:var(--warn)">Enter a code first.</span>'; return; }
  if (res) res.innerHTML = '<span style="color:var(--text-muted)">Redeeming…</span>';
  try {
    const token = localStorage.getItem('udt_token') || S.auth?.token;
    const r = await fetch('https://ultimatedevtools-production.up.railway.app/api/subscription/redeem-promo', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + token },
      body: JSON.stringify({ code })
    });
    const d = await r.json();
    if (!r.ok) throw new Error(d.error || 'Failed');
    if (res) res.innerHTML = `<span style="color:var(--green-dim)">✓ Code applied! ${d.days} day trial activated.</span>`;

  }
}

async function adminFetch(path, opts = {}) {
  const token = localStorage.getItem('udt_token') || S.auth?.token;
  const res = await fetch(BACKEND + path, {
    ...opts,
    headers: { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + token, ...(opts.headers || {}) }
  });
  const d = await res.json();
  if (!res.ok) throw new Error(d.error || `HTTP ${res.status}`);
  return d;
}

function openPayOverlay() {
  _payMethod = null;
  document.querySelectorAll('.pay-opt').forEach(o => o.classList.remove('sel'));
  document.getElementById('pay-inst').innerHTML = '';
  const btn = document.getElementById('pay-gen-btn');
  if (btn) { btn.disabled = false; btn.textContent = 'Generate Details'; }
  document.getElementById('pay-overlay').style.display = 'flex';
}

function paySelect(method, el) {
  _payMethod = method;
  document.querySelectorAll('.pay-opt').forEach(o => o.classList.remove('sel'));
  el.classList.add('sel');
  document.getElementById('pay-inst').innerHTML = '';
}

async function payGenerate() {
  if (!_payMethod) { showToast('Select a payment method first'); return; }
  const btn = document.getElementById('pay-gen-btn');
  btn.disabled = true; btn.textContent = 'Loading…';
  try {
    const token = localStorage.getItem('udt_token') || S.auth?.token;
    const r = await fetch('https://ultimatedevtools-production.up.railway.app/api/subscription/payment/init', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + token },
      body: JSON.stringify({ method: _payMethod })
    });
    const d = await r.json();
    if (!r.ok) throw new Error(d.error || 'Failed');

    const inst = document.getElementById('pay-inst');
    if (_payMethod === 'paypal') {
      inst.innerHTML = `<a href="${d.paypal_url}" target="_blank" class="btn btn-primary btn-full" style="display:block;text-align:center;text-decoration:none;margin-top:8px">Open PayPal →</a>`;
    } else {
      const addrId = 'addr-' + Date.now();
      inst.innerHTML = `
        <div style="font-size:9.5px;color:var(--text-muted);margin-bottom:3px">Send exactly:</div>
        <div class="pay-amt">${d.amount_sol} SOL</div>
        <div style="font-size:9.5px;color:var(--text-muted);margin:6px 0 2px">To (click to copy):</div>
        <div class="pay-addr" id="${addrId}">${d.address}</div>
        <div class="pay-watch"><div class="pay-spin"></div>Watching for confirmation…</div>`;
      document.getElementById(addrId)?.addEventListener('click', () => {
        navigator.clipboard.writeText(d.address); showToast('Address copied!');
      });
      if (_payPoll) clearInterval(_payPoll);
      _payPoll = setInterval(async () => {
        try {
          const pr = await fetch(`https://ultimatedevtools-production.up.railway.app/api/subscription/payment/check/${d.payment_id}`, {
            headers: { 'Authorization': 'Bearer ' + token }
          });
          const pd = await pr.json();
          if (pd.confirmed) {
            clearInterval(_payPoll);
            document.getElementById('pay-overlay').style.display = 'none';
            showToast('Payment confirmed! 🎉');
            await refreshSubStatus();
            if (_webTool === 'subscription') renderSubscriptionPage();
          }
        } catch {}
      }, 5000);
    }
    btn.textContent = '✓ Generated';
  } catch (e) {
    showToast(e.message || 'Failed');
    btn.disabled = false; btn.textContent = 'Generate Details';
  }
}
</script>
</body>
</html>
