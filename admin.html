<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Admin — Solana Dev Tools</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="shared.css">
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <main class="container" style="padding: 32px 0 50px;">
    <div class="topbar">
      <div>
        <h1 class="title">Admin</h1>
        <p class="subtitle">Server-side user and promo management.</p>
      </div>
      <a class="btn ghost" href="dashboard.html">Back</a>
    </div>

    <div class="grid grid-2">
      <section class="card panel">
        <h2>Create promo code</h2>
        <form id="promo-form" class="form-grid">
          <div><label class="label">Code</label><input class="input" name="code" placeholder="SUMMER30" required></div>
          <div><label class="label">Days</label><input class="input" type="number" name="days" value="30" required></div>
          <div><label class="label">Label</label><input class="input" name="label" placeholder="Campaign name"></div>
          <div style="display:flex;align-items:end;"><button class="btn primary" type="submit">Create promo</button></div>
        </form>
        <div id="promo-result" style="margin-top:14px;"></div>
      </section>

      <section class="card panel">
        <h2>Whitelist user</h2>
        <form id="whitelist-form" class="form-grid">
          <div><label class="label">Email</label><input class="input" type="email" name="email" required></div>
          <div style="display:flex;align-items:end;"><button class="btn primary" type="submit">Whitelist</button></div>
        </form>
        <div id="whitelist-result" style="margin-top:14px;"></div>
      </section>
    </div>

    <section class="card panel" style="margin-top:16px;">
      <h2>Users</h2>
      <div class="row" style="margin-bottom:12px;">
        <input id="user-search" class="input" placeholder="Search email or name">
        <button id="user-search-btn" class="btn ghost">Search</button>
      </div>
      <div id="users-table" class="muted">Loading…</div>
    </section>

    <section class="card panel" style="margin-top:16px;">
      <h2>Promo codes</h2>
      <div id="promo-table" class="muted">Loading…</div>
    </section>
  </main>

  <script src="api.js"></script>
  <script>
    async function bootAdmin() {
      const user = await UDT.AuthAPI.restore();
      if (!user) { location.replace('auth.html'); return; }

      async function loadUsers(search = '') {
        try {
          const data = await UDT.AdminAPI.users(1, search);
          const rows = data.users.map((user) => `
            <tr>
              <td>${user.email}</td>
              <td>${user.name}</td>
              <td>${user.sub_active ? 'Active' : 'Inactive'}</td>
              <td>${user.expires_at ? new Date(user.expires_at).toLocaleString() : '—'}</td>
              <td>
                <button class="btn ghost" data-extend="${user.id}">+30d</button>
                <button class="btn danger" data-revoke="${user.id}">Revoke</button>
              </td>
            </tr>
          `).join('');
          document.getElementById('users-table').innerHTML = `<table class="table"><thead><tr><th>Email</th><th>Name</th><th>Subscription</th><th>Expires</th><th></th></tr></thead><tbody>${rows || '<tr><td colspan="5">No users found.</td></tr>'}</tbody></table>`;

          document.querySelectorAll('[data-extend]').forEach((button) => {
            button.addEventListener('click', async () => {
              await UDT.AdminAPI.extendSubscription(Number(button.dataset.extend), 30, false);
              await loadUsers(search);
            });
          });

          document.querySelectorAll('[data-revoke]').forEach((button) => {
            button.addEventListener('click', async () => {
              await UDT.AdminAPI.revokeSubscription(Number(button.dataset.revoke));
              await loadUsers(search);
            });
          });
        } catch (error) {
          document.getElementById('users-table').textContent = error.message;
        }
      }

      async function loadPromo() {
        try {
          const data = await UDT.AdminAPI.promo();
          const rows = data.promoCodes.map((promo) => `
            <tr>
              <td>${promo.code}</td>
              <td>${promo.days}</td>
              <td>${promo.label || '—'}</td>
              <td>${promo.redeemed_at ? new Date(promo.redeemed_at).toLocaleString() : 'Unused'}</td>
            </tr>
          `).join('');
          document.getElementById('promo-table').innerHTML = `<table class="table"><thead><tr><th>Code</th><th>Days</th><th>Label</th><th>Redeemed</th></tr></thead><tbody>${rows || '<tr><td colspan="4">No promo codes yet.</td></tr>'}</tbody></table>`;
        } catch (error) {
          document.getElementById('promo-table').textContent = error.message;
        }
      }

      document.getElementById('promo-form').addEventListener('submit', async (event) => {
        event.preventDefault();
        const data = new FormData(event.currentTarget);
        try {
          await UDT.AdminAPI.createPromo(
            String(data.get('code') || '').toUpperCase(),
            Number(data.get('days') || 0),
            String(data.get('label') || '')
          );
          document.getElementById('promo-result').innerHTML = '<div class="badge ok">Promo created</div>';
          event.currentTarget.reset();
          await loadPromo();
        } catch (error) {
          document.getElementById('promo-result').innerHTML = `<div class="badge danger">${error.message}</div>`;
        }
      });

      document.getElementById('whitelist-form').addEventListener('submit', async (event) => {
        event.preventDefault();
        const data = new FormData(event.currentTarget);
        try {
          await UDT.AdminAPI.whitelist(String(data.get('email') || ''));
          document.getElementById('whitelist-result').innerHTML = '<div class="badge ok">User whitelisted</div>';
          event.currentTarget.reset();
          await loadUsers();
        } catch (error) {
          document.getElementById('whitelist-result').innerHTML = `<div class="badge danger">${error.message}</div>`;
        }
      });

      document.getElementById('user-search-btn').addEventListener('click', () => {
        loadUsers(document.getElementById('user-search').value || '');
      });

      await loadUsers();
      await loadPromo();
    }

    bootAdmin();
  </script>
</body>
</html>
