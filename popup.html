<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Ultimate Dev Tools</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:opsz,wght@9..40,400;9..40,500;9..40,600;9..40,700&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <div id="root">
    <div class="shell">

      <!-- ── Sidebar ─────────────────────── -->
      <nav class="sidebar" id="sidebar">

        <div class="brand-bar">
          <div class="brand-logo-slot" style="background:none;box-shadow:none;border-radius:0;overflow:visible">
            <img src="icon128.png" width="28" height="28" style="display:block;border-radius:6px"/>
          </div>
          <span class="brand-studio-name">Essor Studios</span>
        </div>

        <div class="brand-product">
          <div class="brand-product-name">Ultimate<br>Dev Tools</div>
          <div class="brand-product-tag">Professional Toolkit</div>
        </div>

        <div class="nav-section-label">TOOLS</div>
        <ul class="nav-list" id="nav-list">

          <li class="nav-item" data-tool="token-splitting">
            <svg class="nav-svg" width="13" height="13" viewBox="0 0 13 13" fill="none">
              <circle cx="3" cy="6.5" r="2" stroke="currentColor" stroke-width="1.3"/>
              <circle cx="10" cy="3" r="2" stroke="currentColor" stroke-width="1.3"/>
              <circle cx="10" cy="10" r="2" stroke="currentColor" stroke-width="1.3"/>
              <path d="M5 6.5h2l1.5-3.5M7 6.5l1.5 3.5" stroke="currentColor" stroke-width="1.2" stroke-linecap="round"/>
            </svg>
            <span class="nav-label">Token Splitting</span>
          </li>

          <li class="nav-item" data-tool="bundle-checker">
            <svg class="nav-svg" width="13" height="13" viewBox="0 0 13 13" fill="none">
              <path d="M2 9.5L6.5 2 11 9.5H2z" stroke="currentColor" stroke-width="1.3" stroke-linejoin="round"/>
              <path d="M6.5 6v2M6.5 9.3v.2" stroke="currentColor" stroke-width="1.3" stroke-linecap="round"/>
            </svg>
            <span class="nav-label">Bundle Checker</span>
          </li>

          <li class="nav-item" data-tool="volume-bot">
            <svg class="nav-svg" width="13" height="13" viewBox="0 0 13 13" fill="none">
              <!-- bot head -->
              <rect x="2" y="4" width="9" height="6.5" rx="1.5" stroke="currentColor" stroke-width="1.2"/>
              <!-- antenna -->
              <line x1="6.5" y1="1.5" x2="6.5" y2="4" stroke="currentColor" stroke-width="1.2" stroke-linecap="round"/>
              <circle cx="6.5" cy="1.2" r="0.7" fill="currentColor"/>
              <!-- eyes -->
              <circle cx="4.5" cy="7" r="0.85" fill="currentColor"/>
              <circle cx="8.5" cy="7" r="0.85" fill="currentColor"/>
              <!-- mouth -->
              <path d="M4.8 9h3.4" stroke="currentColor" stroke-width="1.1" stroke-linecap="round"/>
            </svg>
            <span class="nav-label">AI Volume Bot</span>
          </li>

          <li class="nav-item disabled" data-tool="sniper">
            <svg class="nav-svg" width="13" height="13" viewBox="0 0 13 13" fill="none">
              <circle cx="6.5" cy="6.5" r="5" stroke="currentColor" stroke-width="1.3"/>
              <circle cx="6.5" cy="6.5" r="1.5" fill="currentColor"/>
              <path d="M6.5 1.5v2M6.5 9.5v2M1.5 6.5h2M9.5 6.5h2" stroke="currentColor" stroke-width="1.2" stroke-linecap="round"/>
            </svg>
            <span class="nav-label">Sniper Bot</span>
          </li>

          <li class="nav-item" data-tool="wallets">
            <svg class="nav-svg" width="13" height="13" viewBox="0 0 13 13" fill="none">
              <rect x="1" y="3" width="11" height="8" rx="1.5" stroke="currentColor" stroke-width="1.3"/>
              <path d="M1 6h11" stroke="currentColor" stroke-width="1.2"/>
              <path d="M4 2v2M9 2v2" stroke="currentColor" stroke-width="1.2" stroke-linecap="round"/>
              <circle cx="9.5" cy="8.5" r="1.2" fill="currentColor"/>
            </svg>
            <span class="nav-label">Wallets</span>
          </li>

        </ul>

        <div class="sidebar-footer">
          <button class="pin-btn" id="pin-btn" title="Open in Chrome sidebar">
            <svg width="12" height="12" viewBox="0 0 12 12" fill="none">
              <rect x="1" y="1" width="10" height="10" rx="1.5" stroke="currentColor" stroke-width="1.2"/>
              <line x1="8" y1="1" x2="8" y2="11" stroke="currentColor" stroke-width="1.2"/>
              <path d="M9.5 4.5L11 6l-1.5 1.5" stroke="currentColor" stroke-width="1.1" stroke-linecap="round" stroke-linejoin="round"/>
            </svg>
            Pin Sidebar
          </button>
          <button class="settings-btn" data-tool="settings" id="settings-nav-btn">
            <svg width="13" height="13" viewBox="0 0 13 13" fill="none">
              <path d="M5.3 1.5h2.4l.4 1.3a4 4 0 0 1 .9.5l1.3-.4 1.2 2-1 .9a4 4 0 0 1 0 1.1l1 .9-1.2 2-1.3-.4a4 4 0 0 1-.9.5l-.4 1.2H5.3l-.4-1.2a4 4 0 0 1-.9-.5l-1.3.4-1.2-2 1-.9a4 4 0 0 1 0-1.1l-1-.9 1.2-2 1.3.4a4 4 0 0 1 .9-.5l.4-1.3z" stroke="currentColor" stroke-width="1.2" stroke-linejoin="round"/>
              <circle cx="6.5" cy="6.5" r="1.6" stroke="currentColor" stroke-width="1.2"/>
            </svg>
            Settings
          </button>
          <div class="rpc-status">
            <span class="status-dot" id="rpc-dot"></span>
            <span class="status-label" id="rpc-label">Checking…</span>
          </div>
        </div>
      </nav>

      <!-- ── Main panel ──────────────────── -->
      <main class="main" id="main"></main>

    </div>

    <!-- Wallet Picker Modal -->
    <div class="modal-overlay" id="wallet-picker-modal" style="display:none">
      <div class="modal-box" id="wallet-picker-box"></div>
    </div>

    <!-- Emoji Picker Modal -->
    <div class="modal-overlay" id="emoji-modal" style="display:none">
      <div class="modal-box emoji-modal-box" id="emoji-modal-box"></div>
    </div>

  </div>

  <!-- ── Scripts ──────── -->
  <script src="bs58.js"></script>
  <script src="split.js"></script>
  <script src="auth.js"></script>
  <script src="bundle.js"></script>
  <script src="sniper.js"></script>
  <script src="wallets.js"></script>
  <script src="popup.js"></script>
  <script src="volume-bot.js"></script>
</body>
</html>
